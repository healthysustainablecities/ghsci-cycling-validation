<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cycling accessibility validation — interactive maps</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/pmtiles@3.2.0/dist/pmtiles.js"></script>
<script src="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.js.iife.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.css"/>
<style>
  body { margin:0; font-family: system-ui, sans-serif; }
  #map { position:absolute; inset:0; }
  #panel { position:absolute; top:10px; left:10px; z-index:2; background:#fff;
           padding:12px 14px; border-radius:8px; box-shadow:0 1px 6px rgba(0,0,0,.3);
           font-size:13px; width:300px; max-height:calc(100vh - 40px); overflow-y:auto; }
  #panel select#variation {width: 70%;}
  #panel h1 { font-size:14px; margin:0 0 8px; }
  #panel label.row { display:block; margin:5px 0 1px; color:#444; font-size:12px; }
  #panel select { width:100%; margin:0 0 2px; padding:2px; }
  #panel .checks label { display:block; margin:4px 0; }
  #panel .subhead { display:block; margin:8px 0 1px; color:#777; font-size:10.5px;
                     text-transform:uppercase; letter-spacing:.04em; }
  #showing { margin:8px 0; padding:7px 8px; background:#f2f6fa; border-radius:6px;
             font-size:12px; line-height:1.35; }
  #showing b { font-size:12.5px; }
  #notice { color:#b00; font-size:12px; margin:4px 0; display:none; }
  button.small { font-size:12px; padding:2px 8px; border:1px solid #bbb; background:#fafafa;
                 border-radius:5px; cursor:pointer; }
  button.small:hover { background:#eee; }
  #infoBtn { border-radius:50%; width:22px; height:22px; padding:0; font-weight:bold;
             font-family:serif; font-style:italic; }
  .selrow { display:flex; gap:6px; align-items:flex-end; }
  .selrow > div { flex:1; }
  /* wrapper around Destination */
  .selrow > div:first-child {
    flex: 0 0 70%;
  }
  /* wrapper around Variation */
  .selrow > div:last-child {
    flex: 1 0 30%;
  }
  .selrow > div.info-wrap {
    flex: 0 0 30%;
  }
  /* centre contents of the second div */
  .info-wrap {
    display: flex;
    align-items: center;      /* vertical alignment */
    justify-content: center;  /* horizontal centre */
    gap: 4px;                 /* space between select and "i" */
  }
  .info-wrap select {
    width: auto;   /* or a % if you want the button closer/further */
  }
  .leg { margin-top:8px; }
  .leg-title { display:block; font-size:11.5px; color:#444; margin-bottom:2px; }
  .leg-row { display:flex; gap:2px; }
  .leg-item { flex:1; text-align:center; font-size:11px; cursor:pointer;
              border-radius:3px; padding:1px 0 0; }
  .leg-item .patch { display:block; height:12px; border-radius:2px; margin-bottom:1px; }
  .leg-item.static { cursor:default; }
  .leg-item.selected { outline:2px solid #222; outline-offset:1px; }
  .leg-item:not(.static):hover .patch { filter:brightness(0.92); }
  .histo-bars { display:flex; align-items:flex-end; gap:2px; height:58px;
                margin-top:14px; }
  .histo-bar { flex:1; position:relative; border-radius:2px 2px 0 0; min-height:2px; }
  .histo-val { position:absolute; top:-13px; left:0; right:0; text-align:center;
               font-size:9.5px; color:#333; white-space:nowrap; }
  .histo-x { display:flex; font-size:9.5px; color:#555; }
  .histo-x span { flex:1; text-align:center; }
  .histo-note { font-size:10.5px; color:#555; margin-top:2px; }
  
  .dist-label, .time-label {
    display: block;        /* each label on its own line */
    white-space: nowrap;   /* don't wrap within the label itself */
    line-height: 1.1;
  }

  .dist-label {
    /* optional tweaks */
  }

  .time-label {
    font-size: 10px;
    color: #555;
  }
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:10; display:none;
              align-items:center; justify-content:center; }
  .modal { background:#fff; border-radius:10px; padding:18px 20px; max-width:560px;
           max-height:80vh; overflow-y:auto; font-size:13.5px; line-height:1.5; }
  .modal h2 { font-size:15px; margin:0 0 8px; }
  .modal h3 { font-size:13px; margin:12px 0 4px; }
  #reportView { position:fixed; inset:0; z-index:9; background:#fff; display:none;
                flex-direction:column; }
  #reportView iframe { flex:1; border:0; width:100%; }
  #reportBar { padding:6px 12px; background:#20303f; color:#fff; display:flex;
               justify-content:space-between; align-items:center; font-size:13px; }
  #reportBar button { background:#fff; }
  #hoverTip { position:fixed; pointer-events:none; background:rgba(20,20,20,.92);
              color:#fff; padding:5px 9px; border-radius:6px; font-size:11.5px;
              max-width:240px; z-index:6; display:none; line-height:1.4; }
  .maplibregl-popup-content { font-size:12px; max-width:320px; padding:10px 12px 8px; }
  .popup h4 { margin:0 0 2px; font-size:12.5px; }
  .popup .sub { color:#555; margin:0 0 6px; font-size:11.5px; }
  .popup h5 { margin:8px 0 2px; font-size:11.5px; color:#333; }
  .popup table { width:100%; border-collapse:collapse; }
  .popup td { padding:1px 0; font-size:11.5px; }
  .popup td.v { text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap;
                padding-left:10px; }
  .popup tr.sel td { font-weight:700; }
  .swatch { display:inline-block; width:11px; height:11px; border-radius:2px;
            vertical-align:-1px; margin-right:4px; }
</style>
</head>
<body>
<div id="panel">
  <h1>Cycling access validation</h1>
  <label class="row">City</label>
  <select id="city"></select>

  <label class="row">Indicator</label>
  <select id="threshold"></select>

  <div class="selrow">
    <div>
      <label class="row">Destination</label>
      <select id="concept"></select>
    </div>
    <div>
      <label class="row">Variation</label>
      <select id="variation">
        <option value="strict">Strict</option>
        <option value="lenient">Lenient</option>
      </select>
    </div>
  </div>
  <div class="selrow">
    <div>
      <label class="row">Network</label>
      <select id="network"></select>
    </div>
    <div style="flex:0" id="info-wrap">
      <button class="small" id="infoBtn" title="How to interpret this indicator">i</button>
    </div>
  </div>
  <div id="notice"></div>
  <div id="showing"></div>

  <div class="checks">
    <label><input type="checkbox" id="ltsChk" checked> LTS network</label>
    <label><input type="checkbox" id="gridChk" checked> Grid access choropleth</label>
    <label><input type="checkbox" id="destChk"> Show indicator destinations</label>
    <span class="subhead">Region context</span>
    <label><input type="checkbox" id="boundaryChk" checked> Study region boundary</label>
    <label><input type="checkbox" id="bufferChk"> 5 km analysis buffer</label>
  </div>
  <label class="row">Basemap</label>
  <select id="basemap">
    <option value="sat">Satellite (grayscale)</option>
    <option value="positron">Positron</option>
  </select>

  <div class="leg">
    <span class="leg-title">Level of Traffic Stress (LTS)</span>
    <div id="ltsLegend" class="leg-row"></div>
  </div>

  <div class="leg">
    <span class="leg-title" title="50% of population access to destination by distance band (m) using selected network">Access within distance (m)</span>
    <div id="accLegend" class="leg-row"></div>
    <div id="accLegendTimes" class="leg-row leg-row-secondary"></div>
  </div>

  <div class="leg" id="histo" style="display:none">
    <span class="leg-title" id="histoTitle"></span>
    <div class="histo-bars" id="histoBars"></div>
    <div class="histo-x" id="histoX"></div>
    <div class="histo-note" id="histoNote"></div>
  </div>

  <div style="margin-top:10px; display:flex; gap:6px" id="actionBtns">
    <button class="small" id="tourBtn">Tour</button>
    <button class="small" id="shareBtn">Copy share link</button>
    <button class="small" id="reportBtn" style="display:none">View validation report</button>
  </div>
</div>

<div id="map"></div>
<div id="hoverTip"></div>

<div class="modal-bg" id="infoModal"><div class="modal" id="infoBody"></div></div>
<div id="reportView">
  <div id="reportBar">
    <span id="reportTitle"></span>
    <button class="small" id="reportClose">Back to map</button>
  </div>
  <iframe id="reportFrame"></iframe>
</div>

<script>
const CITY_SLUGS = ['wurzburg', 'dar_es_salaam', 'melbourne', 'minneapolis', 'mexico_city', 'mexico_city_proper'];

const CONCEPTS = {
  food: { label: 'Fresh food / market', strict: 'fresh_food_market', lenient: 'fresh_food_pooled' },
  pt:   { label: 'Public transport', strict: 'pt_frequent', lenient: 'pt_any' },
  pos:  { label: 'Public open space entry points', strict: 'public_open_space_large', lenient: 'public_open_space_any' },
  ac:   { label: 'Activity centres', strict: 'activity_centre_complete', lenient: 'activity_centre_local' },
  all:  { label: 'All destinations (combined)', strict: 'all_strict', lenient: 'all_lenient' },
};
const IND_LABELS = {
  fresh_food_market: 'Fresh food / market',
  fresh_food_pooled: 'Fresh food (incl. convenience)',
  pt_frequent: 'Public transport (frequent)',
  pt_any: 'Public transport (any)',
  public_open_space_large: 'Public open space entries (large)',
  public_open_space_any: 'Public open space entries (any)',
  activity_centre_complete: 'Activity centres (complete)',
  activity_centre_local: 'Activity centres (local)',
  all_strict: 'All destinations (strict)',
  all_lenient: 'All destinations (lenient)',
};
const IND_ORDER = Object.keys(IND_LABELS);
const NETWORKS = {
  lts1_: { label: 'LTS 1 only',
           desc: 'routes restricted to the lowest-stress streets only (LTS 1) for their full length' },
  safe_: { label: 'LTS 1–2 (low stress)',
           desc: 'routes restricted to low-stress streets (LTS 1–2) for their full length' },
  '':    { label: 'Danger-weighted (full network)',
           desc: 'routes over the full cycleable network, with length along higher-stress (LTS 3–4) streets penalised by a factor of 1.25 — a benefit-of-the-doubt measure' },
};
// Threshold now selects the *display mode*: isochrone bands (all four distances
// at once, matching the static report) or a continuous average-distance map.
const THRESHOLDS = {
  iso: 'Access within distance/time',
  avg: 'Average distance to nearest',
};
const ISO_DISTANCES = ['500m', '1000m', '2000m', '5000m'];
// Exact Crameri batlow samples at t=1.0/0.667/0.333/0.0, matching
// _validation_report.py's _plot_isochrone_ax so the dashboard and static
// report read as the same colour language.
const ISO_COLORS = ['#faccfa', '#d29343', '#3c6d56', '#011959'];
const ISO_NO_ACCESS = '#888888';
const IND_DESCS = {
  fresh_food_market: 'a fresh food market or supermarket',
  fresh_food_pooled: 'any fresh food source — markets and supermarkets pooled with convenience stores (lenient definition)',
  pt_frequent: 'a public transport stop with a scheduled service at least every 20 minutes (strict definition)',
  pt_any: 'any public transport stop',
  public_open_space_large: 'an entry point to a large (>1.5 ha) public open space (strict definition)',
  public_open_space_any: 'an entry point to any public open space',
  activity_centre_complete: 'a “complete” activity centre — a network location whose 400 m walking catchment contains a strict-definition destination of every category (fresh food, public open space, frequent public transport)',
  activity_centre_local: 'a “local” activity centre — a network location whose 400 m walking catchment contains a lenient-definition destination of every category (fresh food incl. convenience, any public open space, any public transport)',
  all_strict: 'at least one destination of every category (fresh food, public open space, public transport), each at its strict definition',
  all_lenient: 'at least one destination of every category (fresh food, public open space, public transport), each at its lenient definition',
};

// which overlay layers + destination-point filters each indicator maps to
const DEST_OVERLAYS = {
  fresh_food_market: { dest: ['fresh_food_market'] },
  fresh_food_pooled: { dest: ['fresh_food_market', 'convenience'] },
  pt_any: { dest: ['pt_any'] },
  pt_frequent: { ptfreq: true },
  public_open_space_large: { pos_large: true },
  public_open_space_any: { pos_any: true },
  activity_centre_complete: { ac_complete: true },
  activity_centre_local: { ac_local: true },
  all_strict: { dest: ['fresh_food_market'], ptfreq: true, pos_large: true },
  all_lenient: { dest: ['fresh_food_market', 'convenience', 'pt_any'], pos_any: true },
};
const OVERLAY_COLORS = {
  dest_pts: '#e6194b', ptfreq_pts: '#e6194b',
  pos_any_pts: '#f032e6', pos_large_pts: '#f032e6',
  ac_local_pts: '#f032e6', ac_complete_pts: '#f032e6',
};

const BATLOW = ['#011959', '#10505f', '#3c7156', '#a8963c', '#f9a380', '#fdb4c7'];
const LTS_COLOURS = { 1: '#1a9850', 2: '#a6d96a', 3: '#fdae61', 4: '#d73027' };
const LTS_LABELS = { 1: 'lowest stress, suitable for all', 2: 'low stress',
                     3: 'moderate stress', 4: 'high stress' };
const DIM_COLOR = '#999999';

const protocol = new pmtiles.Protocol();
maplibregl.addProtocol('pmtiles', protocol.tile);

const $ = id => document.getElementById(id);
const manifests = {};
let map, cols = new Set(), slug = null, hasReport = false;
// legend-click "isolate" state: null, or { kind: 'lts', value: 1..4 }
// or { kind: 'iso', value: 0..3 (distance band) | 4 (no access) }
let isolated = null;

// ---- shareable URL state (#city=…&d=…&v=…&t=…&n=…&l=…&b=…&m=zoom/lat/lng) ----
const LAYER_CHECKS = ['ltsChk', 'gridChk', 'destChk', 'boundaryChk', 'bufferChk'];
const initialState = location.hash.length > 1
  ? new URLSearchParams(location.hash.slice(1)) : null;
let initialCameraPending = !!(initialState && initialState.get('m'));

function updateHash() {
  if (!map || !slug) return;
  const p = new URLSearchParams();
  p.set('city', slug);
  p.set('d', $('concept').value);
  p.set('v', $('variation').value);
  p.set('t', $('threshold').value);
  p.set('n', $('network').value);
  p.set('l', LAYER_CHECKS.filter(id => $(id).checked).join('.'));
  p.set('b', $('basemap').value);
  const c = map.getCenter();
  p.set('m', `${map.getZoom().toFixed(2)}/${c.lat.toFixed(5)}/${c.lng.toFixed(5)}`);
  history.replaceState(null, '', '#' + p.toString());
}

function applyInitialControls() {
  if (!initialState) return;
  const setIf = (id, val, ok) => { if (val !== null && ok(val)) $(id).value = val; };
  setIf('concept', initialState.get('d'), v => v in CONCEPTS);
  setIf('variation', initialState.get('v'), v => ['strict', 'lenient'].includes(v));
  const rawT = initialState.get('t');
  setIf('threshold', rawT, v => v in THRESHOLDS);
  // back-compat with pre-isochrone share links that stored a distance (e.g. "2000m")
  if (rawT && /^\d+m$/.test(rawT)) $('threshold').value = 'iso';
  const n = initialState.get('n');
  if (n !== null && n in NETWORKS) $('network').value = n;
  const l = initialState.get('l');
  if (l !== null) {
    const on = l.split('.');
    for (const id of LAYER_CHECKS) $(id).checked = on.includes(id);
  }
  setIf('basemap', initialState.get('b'), v => ['sat', 'positron'].includes(v));
}

function pctCol(net, ind, distm) { return `pct_access_cycle_${net}${ind}_${distm}`; }
function avgCol(net, ind) { return `avg_cycle_dist_${net}${ind}`; }
function currentIndicator() {
  const c = CONCEPTS[$('concept').value];
  return c[$('variation').value];
}
// "reference" column for region-overall stat / fallback lookups: the 2 km band
// in isochrone mode (a stable single number), or the avg-distance column.
function currentColumn() {
  const net = $('network').value, ind = currentIndicator();
  return $('threshold').value === 'avg' ? avgCol(net, ind) : pctCol(net, ind, '2000m');
}

function fillSelect(sel, entries) {
  sel.innerHTML = '';
  for (const [v, label] of entries) sel.add(new Option(label, v));
}

function hasIsoData(net, con, vari) {
  return cols.has(pctCol(net, CONCEPTS[con][vari], '2000m'));
}
function hasAvgData(net, con, vari) {
  return cols.has(avgCol(net, CONCEPTS[con][vari]));
}
function hasModeData(mode, net, con, vari) {
  return mode === 'avg' ? hasAvgData(net, con, vari) : hasIsoData(net, con, vari);
}

// grey out options that have no data for this city given the other current picks
function refreshAvailability() {
  const net = $('network').value, vari = $('variation').value,
        con = $('concept').value, mode = $('threshold').value;
  for (const o of $('network').options)
    o.disabled = !hasModeData(mode, o.value, con, vari);
  for (const o of $('threshold').options)
    o.disabled = !hasModeData(o.value, net, con, vari);
  for (const o of $('variation').options)
    o.disabled = !hasModeData(mode, net, con, o.value);
  for (const o of $('concept').options)
    o.disabled = !['strict', 'lenient'].some(v => hasModeData(mode, net, o.value, v));
}

// if the current combination has no data, walk to the nearest valid one
function autofix() {
  const con = $('concept').value;
  if (hasModeData($('threshold').value, $('network').value, con, $('variation').value)) return true;
  for (const mode of [$('threshold').value, 'iso', 'avg'])
    for (const vari of [$('variation').value, 'strict', 'lenient'])
      for (const net of [$('network').value, 'safe_', '', 'lts1_'])
        if (hasModeData(mode, net, con, vari)) {
          $('threshold').value = mode; $('variation').value = vari; $('network').value = net;
          return true;
        }
  return false;
}

function showingText() {
  const ind = currentIndicator(), mode = $('threshold').value, net = $('network').value;
  const body = mode === 'avg'
    ? `Average network distance (m) from each grid cell’s sample points to the nearest destination — ${NETWORKS[net].label} routing.`
    : `Each grid cell is coloured by the closest distance band (500 m / 1000 m / 2000 m / 5000 m) at which at least half its sample points have access — ${NETWORKS[net].label} routing.`;
  return `<b>${IND_LABELS[ind]}</b><br>${body}`;
}

// ---- population-distribution histogram (replaces the "Region overall" line) ----
function _lerpHex(a, b, t) {
  const pa = [1, 3, 5].map(i => parseInt(a.slice(i, i + 2), 16));
  const pb = [1, 3, 5].map(i => parseInt(b.slice(i, i + 2), 16));
  return '#' + pa.map((v, i) => Math.round(v + (pb[i] - v) * t)
    .toString(16).padStart(2, '0')).join('');
}
function _batlowAt(t) { // t in [0,1] along the reversed (pale->dark) ramp
  const ramp = [...BATLOW].reverse();
  const x = Math.max(0, Math.min(1, t)) * (ramp.length - 1);
  const i = Math.min(Math.floor(x), ramp.length - 2);
  return _lerpHex(ramp[i], ramp[i + 1], x - i);
}
function renderHisto() {
  const wrap = $('histo');
  const dist = ((manifests[slug] || {}).distributions || {})[$('network').value + currentIndicator()];
  const mode = $('threshold').value;
  if (!dist || !$('gridChk').checked) { wrap.style.display = 'none'; return; }
  const maxBar = 52; // px, tallest bar
  if (mode === 'iso' && dist.iso) {
    const colors = [...ISO_COLORS, ISO_NO_ACCESS];
    const labels = ['500', '1000', '2000', '5000', 'None'];
    const peak = Math.max(...dist.iso, 1);
    $('histoTitle').textContent = 'Share of population by access band';
    $('histoBars').innerHTML = dist.iso.map((v, i) =>
      `<div class="histo-bar" style="height:${Math.max(2, v / peak * maxBar)}px;background:${colors[i]}">` +
      `<span class="histo-val">${v}%</span></div>`).join('');
    $('histoX').innerHTML = labels.map(l => `<span>${l}</span>`).join('');
    $('histoNote').textContent = '';
    wrap.style.display = 'block';
  } else if (mode === 'avg' && dist.avg) {
    const a = dist.avg;
    const n = a.shares.length;
    const peak = Math.max(...a.shares, 1);
    $('histoTitle').textContent = 'Reachable population by distance to nearest (m)';
    $('histoBars').innerHTML = a.shares.map((v, i) =>
      `<div class="histo-bar" style="height:${Math.max(2, v / peak * maxBar)}px;` +
      `background:${_batlowAt((i + 0.5) / n)}" title="${(i * a.bin_m).toLocaleString()}–${((i + 1) * a.bin_m).toLocaleString()} m: ${v}%"></div>`).join('');
    // break labels: 0 at the lower end, then every second bin edge, 5000+ at the top
    $('histoX').innerHTML = a.shares.map((_, i) => {
      if (i === 0) return '<span style="text-align:left">0</span>';
      if (i === n - 1) return `<span style="text-align:right">${a.max_m.toLocaleString()}+</span>`;
      return `<span>${i % 2 === 0 ? (i * a.bin_m).toLocaleString() : ''}</span>`;
    }).join('');
    $('histoNote').textContent =
      `Population-weighted percentiles: p25 ${a.p25.toLocaleString()} m · ` +
      `median ${a.p50.toLocaleString()} m · p75 ${a.p75.toLocaleString()} m`;
    wrap.style.display = 'block';
  } else {
    wrap.style.display = 'none';
  }
}

function isoExpression(net, ind) {
  const c = ISO_DISTANCES.map(d => pctCol(net, ind, d));
  return ['case',
    ['>=', ['coalesce', ['get', c[0]], -1], 50], ISO_COLORS[0],
    ['>=', ['coalesce', ['get', c[1]], -1], 50], ISO_COLORS[1],
    ['>=', ['coalesce', ['get', c[2]], -1], 50], ISO_COLORS[2],
    ['>=', ['coalesce', ['get', c[3]], -1], 50], ISO_COLORS[3],
    ISO_NO_ACCESS,
  ];
}

function gridFillExpression() {
  const net = $('network').value, ind = currentIndicator();
  if ($('threshold').value === 'avg') {
    const col = avgCol(net, ind);
    const ramp = [...BATLOW].reverse();
    const stops = [0, 1000, 2000, 3000, 4000, 5000];
    const expr = ['interpolate', ['linear'], ['coalesce', ['get', col], -9999], -9999, 'rgba(0,0,0,0)'];
    stops.forEach((s, i) => expr.push(s, ramp[i]));
    return expr;
  }
  return isoExpression(net, ind);
}

function renderLegends() {
  const isAvg = $('threshold').value === 'avg';

  // ---- LTS ----
  const ltsValues = [1, 2, 3, 4];
  $('ltsLegend').innerHTML = ltsValues.map(k => `
    <div
      class="leg-item ${isolated && isolated.kind === 'lts' && isolated.value === k ? 'selected' : ''}"
      data-kind="lts"
      data-value="${k}"
      onclick="toggleIsolate('lts', ${k})"
    >
      <span class="patch" style="background:${LTS_COLOURS[k]}"></span>
      <span>${k}</span>
    </div>
  `).join('');

  // ---- Access / Dist. ----
  if (isAvg) {
    // no interactive isolation in avg mode, so mark as static
    const ramp   = [...BATLOW].reverse();
    const distLabels   = ['0', '1000', '2000', '3000', '4000', '5000'];
    const timeLabels   = ['< 3 min', '~5 min', '~10 min', '~15 min', '~20 min', '~25 min', ''];

    $('accLegend').innerHTML = ramp.map((c, i) => `
      <div class="leg-item static">
        <span class="patch" style="background:${c}"></span>
        <span class="dist-label">${distLabels[i]}</span>
        <span class="time-label">${timeLabels[i]}</span>
      </div>
    `).join('');
  } else if (!isAvg) {
    const swatchColors = [...ISO_COLORS, ISO_NO_ACCESS];
    const distLabels   = ['500 m', '1000 m', '2000 m', '5000 m', 'None'];
    const timeLabels   = ['~3 min', '~5 min', '~10 min', '~25 min', ''];

    $('accLegend').innerHTML = swatchColors.map((c, i) => `
      <div
        class="leg-item ${isolated && isolated.kind === 'iso' && isolated.value === i ? 'selected' : ''}"
        data-kind="iso"
        data-value="${i}"
        onclick="toggleIsolate('iso', ${i})"
      >
        <span class="patch" style="background:${c}"></span>
        <span class="dist-label">${distLabels[i]}</span>
        <span class="time-label">${timeLabels[i]}</span>
      </div>
    `).join('');
    } else {
    const swatchColors = [...ISO_COLORS, ISO_NO_ACCESS];
    const labels = ['500', '1000', '2000', '5000', 'None'];

    $('accLegend').innerHTML = swatchColors.map((c, i) => `
      <div
        class="leg-item ${isolated && isolated.kind === 'iso' && isolated.value === i ? 'selected' : ''}"
        data-kind="iso"
        data-value="${i}"
        onclick="toggleIsolate('iso', ${i})"
      >
        <span class="patch" style="background:${c}"></span>
        <span>${labels[i]}</span>
      </div>
    `).join('');
  }
}

function toggleIsolate(kind, value) {
  isolated = (isolated && isolated.kind === kind && isolated.value === value)
    ? null : { kind, value };
  renderLegends();
  applyIsolation();
}

// Recompute paint properties for lts / grid / destination-overlay layers given
// the current `isolated` legend selection: the chosen category keeps its
// normal colour/opacity, everything else (the other categories in the same
// legend, and the *other* layer type) is recoloured flat grey at low opacity.
function applyIsolation() {
  if (!map) return;
  const isAvg = $('threshold').value === 'avg';

  if (map.getLayer('lts')) {
    if (isolated && isolated.kind === 'lts') {
      map.setPaintProperty('lts', 'line-color',
        ['match', ['get', 'lvl_traf_stress'], isolated.value, LTS_COLOURS[isolated.value], DIM_COLOR]);
      map.setPaintProperty('lts', 'line-opacity',
        ['match', ['get', 'lvl_traf_stress'], isolated.value, 0.95, 0.2]);
    } else {
      map.setPaintProperty('lts', 'line-color', ['match', ['get', 'lvl_traf_stress'],
        1, LTS_COLOURS[1], 2, LTS_COLOURS[2], 3, LTS_COLOURS[3], 4, LTS_COLOURS[4], '#888']);
      map.setPaintProperty('lts', 'line-opacity', isolated ? 0.2 : 0.85);
    }
  }

  if (map.getLayer('grid')) {
    if (!isAvg && isolated && isolated.kind === 'iso') {
      const net = $('network').value, ind = currentIndicator();
      const c = ISO_DISTANCES.map(d => pctCol(net, ind, d));
      const matchExpr = isolated.value < 4
        ? ['>=', ['coalesce', ['get', c[isolated.value]], -1], 50]
        : ['all', ...c.map(col => ['<', ['coalesce', ['get', col], -1], 50])];
      const selColor = isolated.value < 4 ? ISO_COLORS[isolated.value] : ISO_NO_ACCESS;
      map.setPaintProperty('grid', 'fill-color', ['case', matchExpr, selColor, DIM_COLOR]);
      map.setPaintProperty('grid', 'fill-opacity', ['case', matchExpr, 0.8, 0.15]);
    } else {
      map.setPaintProperty('grid', 'fill-color', gridFillExpression());
      map.setPaintProperty('grid', 'fill-opacity', isolated ? 0.15 : 0.65);
    }
  }

  for (const l of Object.keys(OVERLAY_COLORS)) {
    if (!map.getLayer(l)) continue;
    map.setPaintProperty(l, 'circle-color', isolated ? DIM_COLOR : OVERLAY_COLORS[l]);
    map.setPaintProperty(l, 'circle-opacity', isolated ? 0.25 : 1);
  }
}

function updateIndicator() {
  isolated = null;
  refreshAvailability();
  const ok = autofix();
  refreshAvailability();
  $('notice').style.display = ok ? 'none' : 'block';
  $('notice').textContent = ok ? '' : 'This indicator is not available for this city.';
  $('showing').innerHTML = showingText();
  renderLegends();
  renderHisto();
  applyIsolation();
  updateOverlays();
}

const OVERLAY_LAYERS = ['dest_pts', 'ptfreq_pts', 'pos_any_pts', 'pos_large_pts',
                        'ac_local_pts', 'ac_complete_pts'];
function updateOverlays() {
  if (!map || !map.getLayer('dest_pts')) return;
  const on = $('destChk').checked;
  const spec = DEST_OVERLAYS[currentIndicator()] || {};
  const vis = {
    dest_pts: !!spec.dest, ptfreq_pts: !!spec.ptfreq,
    pos_any_pts: !!spec.pos_any, pos_large_pts: !!spec.pos_large,
    ac_local_pts: !!spec.ac_local, ac_complete_pts: !!spec.ac_complete,
  };
  for (const l of OVERLAY_LAYERS) {
    if (!map.getLayer(l)) continue;
    map.setLayoutProperty(l, 'visibility', on && vis[l] ? 'visible' : 'none');
  }
  if (spec.dest)
    map.setFilter('dest_pts', ['match', ['get', 'dest_name'], spec.dest, true, false]);
}

function fmtDist(v) { return (v === null || v === undefined) ? '–' : `${Math.round(v).toLocaleString()} m`; }

function gridPopupHTML(p) {
  const net = $('network').value;
  const sel = currentIndicator();
  const bandRows = IND_ORDER.map(ind => {
    const c = ISO_DISTANCES.map(d => pctCol(net, ind, d));
    if (!c.some(col => cols.has(col))) return '';
    let band = 4;
    for (let i = 0; i < 4; i++) {
      const v = p[c[i]];
      if (v !== undefined && v !== null && v >= 50) { band = i; break; }
    }
    const color = band < 4 ? ISO_COLORS[band] : ISO_NO_ACCESS;
    const label = band < 4 ? `Within ${ISO_DISTANCES[band].replace('m', ' m')}` : 'No access within 5000 m';
    return `<tr class="${ind === sel ? 'sel' : ''}"><td><span class="swatch" style="background:${color}"></span>${IND_LABELS[ind]}</td>` +
           `<td class="v">${label}</td></tr>`;
  }).join('');
  const avgRows = IND_ORDER.map(ind => {
    const c = avgCol(net, ind);
    if (!cols.has(c)) return '';
    return `<tr class="${ind === sel ? 'sel' : ''}"><td>${IND_LABELS[ind]}</td><td class="v">${fmtDist(p[c])}</td></tr>`;
  }).join('');
  let html = `<div class="popup"><h4>${IND_LABELS[sel]}</h4>` +
             `<p class="sub">${NETWORKS[net].label} routing</p>`;
  if (bandRows) html += `<h5>Access band (closest distance with ≥50% of sample points reached)…</h5><table>${bandRows}</table>`;
  if (avgRows) html += `<h5>Average distance to nearest…</h5><table>${avgRows}</table>`;
  return html + '</div>';
}

function ltsPopupHTML(p) {
  const lts = p.lvl_traf_stress;
  const row = (k, v) => (v === null || v === undefined || v === '') ? ''
    : `<tr><td>${k}</td><td class="v">${v}</td></tr>`;
  return `<div class="popup"><h4>${p.name || 'Unnamed way'}</h4>` +
    `<p class="sub"><span class="swatch" style="background:${LTS_COLOURS[lts] || '#888'}"></span>` +
    `LTS ${lts} — ${LTS_LABELS[lts] || ''}</p><table>` +
    row('Highway type', p.highway) +
    row('Speed limit', p.maxspeed_kmh ? `${p.maxspeed_kmh} km/h` : null) +
    row('Traffic (assumed ADT)', p.adt ? Math.round(p.adt).toLocaleString() : null) +
    row('Cycling facility', p.bike_facility) +
    row('Dismount required', p.foot_dismount ? 'yes' : null) +
    row('Segment length', p.length_m ? `${p.length_m} m` : null) +
    '</table></div>';
}

// ---- hover tooltips on destination-type point layers ----
const HOVER_LAYERS = ['dest_pts', 'ptfreq_pts', 'pos_any_pts', 'pos_large_pts', 'ac_local_pts', 'ac_complete_pts'];
function hoverHTML(layerId, p) {
  switch (layerId) {
    case 'dest_pts':
      return `<b>${p.dest_name_full || p.dest_name || 'Destination'}</b>`;
    case 'ptfreq_pts': {
      const bits = [p.stop_name, p.mode, p.headway ? `every ${Math.round(p.headway)} min` : null]
        .filter(Boolean).join(' · ');
      return `<b>Public transport (frequent)</b>${bits ? `<br>${bits}` : ''}`;
    }
    case 'pos_any_pts':
    case 'pos_large_pts': {
      const tier = layerId === 'pos_large_pts' ? 'large' : 'any';
      const ha = (p.aos_ha !== null && p.aos_ha !== undefined) ? `<br>${p.aos_ha} ha open space` : '';
      return `<b>Public open space entry (${tier})</b>${ha}`;
    }
    case 'ac_local_pts':
      return '<b>Local activity centre</b><br>lenient-definition destinations of every category within 400 m';
    case 'ac_complete_pts':
      return '<b>Complete activity centre</b><br>strict-definition destinations of every category within 400 m';
    default:
      return '';
  }
}
function wireHover() {
  const tip = $('hoverTip');
  for (const l of HOVER_LAYERS) {
    map.on('mousemove', l, e => {
      if (!e.features.length) return;
      map.getCanvas().style.cursor = 'pointer';
      tip.innerHTML = hoverHTML(l, e.features[0].properties);
      tip.style.left = (e.originalEvent.clientX + 14) + 'px';
      tip.style.top = (e.originalEvent.clientY + 10) + 'px';
      tip.style.display = 'block';
    });
    map.on('mouseleave', l, () => {
      map.getCanvas().style.cursor = '';
      tip.style.display = 'none';
    });
  }
}

function infoHTML() {
  const ind = currentIndicator(), net = $('network').value, mode = $('threshold').value;
  const what = mode === 'avg'
    ? `the <b>average network distance</b> (metres) from the cell’s sample points to the nearest such destination, averaged only over sample points that can reach one at all — so sparse areas can show few reachable points <i>and</i> long distances`
    : `an <b>isochrone-style distance band</b>: the closest of 500 m, 1000 m, 2000 m or 5000 m at which at least half the cell’s sample points can reach such a destination (neutral grey = no band within 5000 m has majority access)`;
  const isoSection = mode === 'avg' ? '' : `
    <h3>Reading the colour bands</h3>
    <p>Each grid cell is coloured by the <b>closest</b> distance at which the majority
    (≥ 50%) of its sample points have access — pale pink/yellow = very close (500 m),
    shading through to dark blue = only reachable at 5000 m, grey = not reachable within
    any configured distance. This mirrors the isochrone maps in the full validation
    report. Click a swatch in the legend to isolate that band on the map.</p>`;
  return `<h2>How to read this indicator</h2>
    <p><b>${IND_LABELS[ind]}</b> — for each 100 m population grid cell, the map shows ${what}.</p>
    <h3>Destination</h3><p>Access is counted to ${IND_DESCS[ind]}.</p>
    ${isoSection}
    <h3>Routing (${NETWORKS[net].label})</h3>
    <p>Routes are computed over ${NETWORKS[net].desc}. Level of Traffic Stress (LTS) grades each
    street segment from 1 (lowest stress, suitable for all riders) to 4 (high stress), based on
    cycling infrastructure, street class, speed limit and assumed traffic volumes derived from
    OpenStreetMap.</p>
    <h3>Walking the bike (dismount links)</h3>
    <p>Footways, paths and pedestrian areas where riding is not permitted are still part of
    the routable network: a rider may dismount and walk the bike along them, and they are
    graded LTS 1 since they are traffic-free. Each metre walked counts as <b>3 m</b> of the
    distance threshold, reflecting walking pace (~5 km/h) against cycling (~15 km/h).
    Stairs and indoor corridors are excluded as impractical with a bike. On the map, such
    segments show “Dismount required: yes” when clicked.</p>
    <h3>Strict vs lenient</h3>
    <p>Each destination category has a <b>strict</b> definition (fresh food markets only;
    frequent public transport; large open spaces; “complete” activity centres) and a
    <b>lenient</b> one (pooled fresh food sources; any stop; any open space; “local”
    activity centres). Comparing the two brackets the plausible range for access.</p>
    <p style="text-align:right"><button class="small" onclick="infoModal.style.display='none'">Close</button></p>`;
}

async function loadCity(s) {
  slug = s;
  isolated = null;
  const manifest = manifests[s];
  cols = new Set(manifest.grid_columns || []);
  const b = manifest.bbox;
  hasReport = (await fetch(`./reports/${s}.html`, { method: 'HEAD' }).catch(() => ({ ok: false }))).ok;
  $('reportBtn').style.display = hasReport ? 'inline-block' : 'none';

  const circle = (colour, r) => ({
    'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, r * 0.6, 14, r],
    'circle-color': colour, 'circle-stroke-color': '#fff', 'circle-stroke-width': 1,
  });
  const style = {
    version: 8,
    sources: {
      sat: { type: 'raster',
        tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
        tileSize: 256, attribution: 'Esri' },
      positron: { type: 'raster',
        tiles: ['https://basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png'],
        tileSize: 256, attribution: 'CARTO / OSM' },
      city: { type: 'vector', url: `pmtiles://${new URL(`tiles/${s}.pmtiles`, location.href).href}` },
      city_lts: { type: 'vector', url: `pmtiles://${new URL(`tiles/${s}_lts.pmtiles`, location.href).href}` },
      city_grid: { type: 'vector', url: `pmtiles://${new URL(`tiles/${s}_grid.pmtiles`, location.href).href}` },
    },
    layers: [
      { id: 'sat', type: 'raster', source: 'sat', paint: { 'raster-saturation': -1 },
        layout: { visibility: $('basemap').value === 'sat' ? 'visible' : 'none' } },
      { id: 'positron', type: 'raster', source: 'positron',
        layout: { visibility: $('basemap').value === 'positron' ? 'visible' : 'none' } },
      { id: 'grid', type: 'fill', source: 'city_grid', 'source-layer': 'grid',
        layout: { visibility: $('gridChk').checked ? 'visible' : 'none' },
        paint: { 'fill-color': 'rgba(0,0,0,0)', 'fill-opacity': 0.65 } },
      { id: 'buffer', type: 'line', source: 'city', 'source-layer': 'buffer',
        layout: { visibility: $('bufferChk').checked ? 'visible' : 'none' },
        paint: { 'line-color': '#000', 'line-width': 1.4, 'line-dasharray': [1, 2] } },
      { id: 'boundary', type: 'line', source: 'city', 'source-layer': 'boundary',
        layout: { visibility: $('boundaryChk').checked ? 'visible' : 'none' },
        paint: { 'line-color': '#000', 'line-width': 2, 'line-dasharray': [3, 2] } },
      { id: 'lts', type: 'line', source: 'city_lts', 'source-layer': 'lts',
        layout: { visibility: $('ltsChk').checked ? 'visible' : 'none' },
        paint: { 'line-color': ['match', ['get', 'lvl_traf_stress'],
                   1, LTS_COLOURS[1], 2, LTS_COLOURS[2], 3, LTS_COLOURS[3], 4, LTS_COLOURS[4], '#888'],
                 'line-width': ['interpolate', ['linear'], ['zoom'], 8, 0.4, 13, 1.6, 16, 3.5] } },
      { id: 'pos_any_pts', type: 'circle', source: 'city', 'source-layer': 'pos_any',
        layout: { visibility: 'none' }, paint: circle(OVERLAY_COLORS.pos_any_pts, 3.5) },
      { id: 'pos_large_pts', type: 'circle', source: 'city', 'source-layer': 'pos_large',
        layout: { visibility: 'none' }, paint: circle(OVERLAY_COLORS.pos_large_pts, 3.5) },
      { id: 'ac_local_pts', type: 'circle', source: 'city', 'source-layer': 'ac_local',
        layout: { visibility: 'none' }, paint: circle(OVERLAY_COLORS.ac_local_pts, 3.5) },
      { id: 'ac_complete_pts', type: 'circle', source: 'city', 'source-layer': 'ac_complete',
        layout: { visibility: 'none' }, paint: circle(OVERLAY_COLORS.ac_complete_pts, 3.5) },
      { id: 'dest_pts', type: 'circle', source: 'city', 'source-layer': 'destinations',
        layout: { visibility: 'none' }, paint: circle(OVERLAY_COLORS.dest_pts, 4.5) },
      { id: 'ptfreq_pts', type: 'circle', source: 'city', 'source-layer': 'pt_frequent',
        layout: { visibility: 'none' }, paint: circle(OVERLAY_COLORS.ptfreq_pts, 4.5) },
    ],
  };
  if (map) {
    map.setMinZoom(0);
    map.setStyle(style);
    map.fitBounds([[b[0], b[1]], [b[2], b[3]]], { duration: 0 });
  } else {
    map = new maplibregl.Map({ container: 'map', style, bounds: [[b[0], b[1]], [b[2], b[3]]] });
    map.addControl(new maplibregl.NavigationControl());
    map.on('moveend', updateHash);
    map.on('click', e => {
      const f = map.queryRenderedFeatures(e.point, { layers: ['lts', 'grid'] })[0];
      if (!f) return;
      const html = f.layer.id === 'lts' ? ltsPopupHTML(f.properties) : gridPopupHTML(f.properties);
      new maplibregl.Popup({ maxWidth: '340px' }).setLngLat(e.lngLat).setHTML(html).addTo(map);
    });
    wireHover();
  }
  // don't allow zooming out beyond the whole-city view: low-zoom tiles thin
  // out dense layers to stay within size budgets, which reads as gaps.
  // Floor of 9 because grid tiles below z9 are thinned even for large regions.
  map.setMinZoom(Math.max(9, map.getZoom() - 0.1));
  if (initialCameraPending) {
    initialCameraPending = false;
    const [z, lat, lng] = (initialState.get('m') || '').split('/').map(Number);
    if ([z, lat, lng].every(Number.isFinite)) map.jumpTo({ center: [lng, lat], zoom: z });
  }
  const apply = () => { updateIndicator(); updateHash(); };
  map.isStyleLoaded() ? apply() : map.once('styledata', apply);
}

  { element: '#basemap', popover: {
      title: 'Ground truth with satellite',
      description: 'Switch to the grayscale <b>satellite</b> basemap to check streets ' +
        'and destinations against aerial imagery — useful when judging whether an ' +
        'LTS rating or a mapped destination is right.' } },
  { element: '#map', popover: {
      title: 'Inspect features',
      description: '<b>Hover</b> a destination point for its details (name, type, ' +
        'service frequency, open-space size). <b>Click</b> a street segment or grid ' +
        'cell for full attributes. In the legend, <b>click a colour band</b> to ' +
        'isolate it on the map (click again to restore).' } },
  { element: '#actionBtns', popover: {
      title: 'Report & sharing',
      description: '<b>View validation report</b> opens your city\'s full written ' +
        'report (statistics, maps, case studies) — the companion document for the ' +
        'form. <b>Copy share link</b> captures your exact view (city, indicator, ' +
        'layers, zoom); paste links into your workbook comments so a specific ' +
        'location or issue can be reproduced exactly.' } },
];
const tour = (window.driver && window.driver.js)
  ? window.driver.js.driver({
      showProgress: true,
      nextBtnText: 'Next', prevBtnText: 'Back', doneBtnText: 'Done',
      steps: TOUR_STEPS,
    })
  : null;
$('tourBtn').onclick = () => { if (tour) tour.drive(); };
if (tour && !localStorage.getItem('cyclingValidationTourSeen')) {
  localStorage.setItem('cyclingValidationTourSeen', '1');
  setTimeout(() => tour.drive(), 1500);
}

(async () => {
  await Promise.all(CITY_SLUGS.map(async s => {
    manifests[s] = await (await fetch(`./tiles/${s}/manifest.json`)).json();
  }));
  fillSelect($('city'), CITY_SLUGS.map(s => [s, manifests[s].name]));
  applyInitialControls();
  const c = initialState && initialState.get('city');
  const startSlug = CITY_SLUGS.includes(c) ? c : CITY_SLUGS[0];
  $('city').value = startSlug;
  loadCity(startSlug);
})();
</script>
</body>
</html>
